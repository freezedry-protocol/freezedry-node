# Freeze Dry Node — nginx reverse proxy configuration
# Copy to /etc/nginx/sites-enabled/ and update server_name + SSL paths
#
# Required: node service bound to 127.0.0.1:3100 (default in v2+)
# Required: SSL certs (use certbot: sudo certbot --nginx -d your.domain.com)

limit_req_zone $binary_remote_addr zone=node_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=health:10m rate=30r/m;

server {
    server_name YOUR_DOMAIN_HERE;   # e.g. node.example.com
    client_max_body_size 50m;  # generous — Fastify bodyLimit is the real gate

    # ─── Public read endpoints ───────────────────────────────────────────

    location = /health {
        limit_req zone=health burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /artworks {
        limit_req zone=node_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3100/artworks;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /artwork/ {
        limit_req zone=node_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /blob/ {
        limit_req zone=node_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /verify/ {
        limit_req zone=node_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /nodes {
        limit_req zone=node_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100/nodes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Webhook (chain event notifications) ─────────────────────────────

    location = /webhook/helius {
        proxy_pass http://127.0.0.1:3100/webhook/helius;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Node sync endpoints ─────────────────────────────────────────────

    location /sync/ {
        limit_req zone=node_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Marketplace (job status) ────────────────────────────────────────

    location /marketplace/ {
        limit_req zone=node_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Optional: direct blob upload (writer nodes only) ────────────────
    # Uncomment if this node accepts direct uploads from browsers.
    #
    # location /upload/ {
    #     limit_req zone=node_api burst=5 nodelay;
    #     proxy_pass http://127.0.0.1:3100;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     client_max_body_size 6m;
    #     proxy_read_timeout 120s;
    #     proxy_send_timeout 120s;
    # }

    # ─── Block dotfiles + deny everything else ───────────────────────────

    location ~ /\. {
        deny all;
    }

    location / {
        return 404;
    }

    # ─── SSL (managed by certbot) ────────────────────────────────────────
    # Run: sudo certbot --nginx -d YOUR_DOMAIN_HERE
    # Certbot will add the listen/ssl directives below automatically.

    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;
    return 301 https://$host$request_uri;
}
